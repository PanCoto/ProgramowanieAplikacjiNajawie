<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie - StudyShare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main>
    <form th:action="@{/login}" method="post" style="max-width: 400px; margin: 5rem auto;">
        <h2>Logowanie</h2>
        <div th:if="${param.error}" class="error-msg">Nieprawidłowy login lub hasło</div>
        <div>
            <label for="username">Login:</label><br>
            <input type="text" id="username" name="username" required aria-required="true">
        </div>
        <br>
        <div>
            <label for="password">Hasło:</label><br>
            <input type="password" id="password" name="password" required aria-required="true">
        </div>
        <br>
        <button type="submit" class="btn">Zaloguj się</button>
        <p>Nie masz konta? <a th:href="@{/register}">Zarejestruj się</a></p>
    </form>
</main>
</body>
</html>
