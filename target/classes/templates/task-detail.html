<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(content=~{::article}, bodyClass='video-bg-page', pageTitle=${task.title} + ' - bookroot')}">
<body>
<article>
    <div id="hero" style="text-align: left; padding: 2rem;">
        <h2 th:text="${task.title}"></h2>
        <p style="font-size: 0.9rem; margin-top: 10px;">
            Kategoria: <strong th:text="${task.category.name}"></strong> |
            Autor: <span th:text="${task.anonymous ? 'Anonim' : task.author.login}"></span>
        </p>
    </div>

    <div class="task-card" style="background: rgba(0,0,0,0.4); margin-bottom: 2rem;">
        <div th:text="${task.content}" style="white-space: pre-wrap; font-size: 1.1rem; line-height: 1.6;"></div>
        <div th:if="${task.imageURL}" style="margin-top: 20px;">
            <img th:src="${task.imageURL}" alt="Zadanie" style="max-width: 100%; border-radius: 10px;">
        </div>
    </div>

    <section id="tasks-list">
        <h3>Odpowiedzi</h3>
        <div th:each="ans : ${task.answers}" class="task-card"
             th:style="${ans.isOfficial} ? 'border: 2px solid #fbbf24; background: rgba(251, 191, 36, 0.05);' : ''">

            <div th:if="${ans.isOfficial}" style="color: #fbbf24; font-weight: bold; margin-bottom: 10px; font-size: 0.8rem; text-transform: uppercase;">
                ⭐ Oficjalna odpowiedź
            </div>

            <p th:text="${ans.content}"></p>

            <div class="task-meta" style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                <span>Przez: <strong th:text="${ans.anonymous ? 'Anonim' : ans.author.login}"></strong></span>
                <span style="font-weight: bold;">Wynik: <span th:text="${ans.score}">0</span></span>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(task.answers)}" style="color: white; opacity: 0.5; margin-bottom: 2rem;">
            Brak odpowiedzi. Bądź pierwszy!
        </div>

        <div sec:authorize="isAuthenticated()" class="task-card" style="border: 1px dashed rgba(255,255,255,0.2);">
            <h4>Dodaj odpowiedź</h4>
            <form th:action="@{/answers/add/{id}(id=${task.id})}" method="post">
                <textarea name="content" required style="width: 100%; min-height: 120px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px;"></textarea>
                <div style="margin-top: 10px;">
                    <label style="color: white; font-size: 0.8rem; cursor: pointer;">
                        <input type="checkbox" name="anonymous"> Odpowiedz anonimowo
                    </label>
                </div>
                <button type="submit" class="btn" style="margin-top: 15px;">Opublikuj</button>
            </form>
        </div>
    </section>
</article>
</body>
</html>
