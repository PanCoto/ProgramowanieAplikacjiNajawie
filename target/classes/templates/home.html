<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyShare - Tablica Główna</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header role="banner">
    <div class="logo">
        <a th:href="@{/}"><h1>StudyShare</h1></a>
    </div>
    <nav role="navigation" aria-label="Menu główne">
        <ul style="list-style: none; display: flex; gap: 20px; align-items: center;">
            <li><a th:href="@{/}">Główna</a></li>
            <li sec:authorize="isAuthenticated()"><a th:href="@{/tasks}">Moje Zadania</a></li>
            <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/users}">Panel Admina</a></li>

            <li sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="btn">Zaloguj się</a>
            </li>
            <li sec:authorize="isAnonymous()">
                <a th:href="@{/register}">Rejestracja</a>
            </li>

            <li sec:authorize="isAuthenticated()">
                    <span style="font-weight: bold;">
                        Witaj, <span sec:authentication="name">Użytkownik</span>!
                    </span>
                <form th:action="@{/logout}" method="post" style="display:inline; margin-left: 10px;">
                    <button type="submit" class="btn" style="background: #ef4444;">Wyloguj</button>
                </form>
            </li>
        </ul>
    </nav>
</header>

<main role="main">
    <section id="hero">
        <h2>Publiczna Tablica Wiedzy</h2>
        <p>Przeglądaj najnowsze zatwierdzone zadania i ucz się razem z nami.</p>
    </section>
