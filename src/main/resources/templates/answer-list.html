<div th:fragment="answer-list(answers, currentTaskId)" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <div th:each="answer : ${answers}" class="card mb-3" th:classappend="${answer.isOfficial} ? 'border-primary shadow-sm' : ''">
        <div class="card-body">
            <span th:if="${answer.isOfficial}" class="badge bg-primary mb-2">
                <i class="bi bi-patch-check-fill"></i> Oficjalne Rozwiązanie
            </span>

            <p class="card-text" th:text="${answer.content}">Treść odpowiedzi...</p>

            <div class="d-flex justify-content-between align-items-center">
                <small class="text-muted">
                    Dodano: <span th:text="${answer.createdDate}">2023-01-01</span> przez:
                     <span th:text="${(answer.anonymous == false || #authorization.expression('hasRole(''ADMIN'')')) ? answer.author.login : 'Anonimowy Student'}">Autor</span>
                </small>

                <div class="btn-group btn-group-sm" role="group" aria-label="Głosowanie na odpowiedź">
                    <form th:action="@{/api/answers/{id}/vote(id=${answer.id}, delta=1)}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-outline-success" aria-label="Głosuj w górę">
                            <i class="bi bi-arrow-up"></i>
                        </button>
                    </form>

                    <span class="btn btn-light disabled fw-bold"
                          th:text="${answer.upvotes - answer.downvotes}"
                          aria-live="polite">0</span>

                    <form th:action="@{/api/answers/{id}/vote(id=${answer.id}, delta=-1)}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-outline-danger" aria-label="Głosuj w dół">
                            <i class="bi bi-arrow-down"></i>
                        </button>
                    </form>
                </div>
            </div>

           <div class="mt-3 ps-4 border-start">
                <h6>Komentarze:</h6>
                <div th:each="comment : ${answer.comments}" class="small mb-1">
                    <strong th:text="${comment.author.login}">User</strong>:
                    <span th:text="${comment.content}">Treść...</span>
                </div>

      <form sec:authorize="isAuthenticated()" th:action="@{/comments/add/{id}(id=${answer.id})}" method="post" class="mt-2">
                    <div class="input-group input-group-sm">
                        <input type="text" name="content" class="form-control" placeholder="Dodaj komentarz..." required aria-label="Treść komentarza">
                        <button class="btn btn-secondary" type="submit">Wyślij</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(answers)}" class="alert alert-light text-center">
        Brak odpowiedzi dla tego zadania. Bądź pierwszy!
    </div>
</div>
