<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(content=~{::section.home-content}, bodyClass='video-bg-page', pageTitle='bookroot - Strona główna')}">
<body>
<section class="home-content">
    <section id="hero">
        <h2>Publiczna Tablica Wiedzy</h2>
        <p>Przeglądaj najnowsze zatwierdzone zadania i ucz się razem z nami.</p>
    </section>

    <section id="tasks-list">
        <h3>Najnowsze zadania : </h3>
        <div th:if="${tasks == null || #lists.isEmpty(tasks)}">
            <p>Obecnie nie ma żadnych zatwierdzonych zadań. Zaloguj się, aby dodać pierwsze!</p>
        </div>

        <div th:each="task : ${tasks}" class="task-card">
            <h4 th:text="${task.title}">Tytuł zadania</h4>
            <p th:text="${#strings.abbreviate(task.content, 150)}"></p>
            <div class="task-meta" style="font-size: 0.85rem; color: #666; margin-top: 10px;">
                <span>Kategoria: <strong th:text="${task.category != null ? task.category.name : 'Brak'}">Brak</strong></span> |
                <span>Data: <span th:text="${task.createdDate}"></span></span>
            </div>
            <a th:href="@{/tasks/{id}(id=${task.id})}" class="btn" style="margin-top: 10px;">Zobacz szczegóły</a>
        </div>
    </section>
</section>
</body>
</html>
